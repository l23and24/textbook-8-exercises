<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фізика 8 клас - Вправи</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
        }
        .exercise-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .exercise-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4 md:px-10">

    <header class="max-w-4xl mx-auto text-center mb-12">
        <h1 class="text-4xl font-extrabold text-blue-800 mb-2">Фізика 8 клас</h1>
        <p class="text-xl text-gray-600">Вправи для самостійної роботи й самостійного опрацювання (1 — 42)</p>
        <div class="h-1 w-32 bg-blue-500 mx-auto mt-4 rounded-full"></div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <!-- Генерація карток вправ -->
        <script>
            const exercisesCount = 42; 
            const subExercisesCount = 10; 

            const mainContainer = document.querySelector('main');

            for (let i = 1; i <= exercisesCount; i++) {
                const card = document.createElement('div');
                card.className = 'exercise-card bg-white rounded-xl border border-gray-200 p-5 shadow-sm flex flex-col';
                
                let subLinks = '';
                for (let j = 1; j <= subExercisesCount; j++) {
                    // Формуємо назву файлу: наприклад 1.1.html, 1.2.html... 42.10.html
                    const fileName = `${i}.${j}.html`;
                    
                    subLinks += `
                        <a href="${fileName}" title="Відкрити вправу ${i}.${j}" class="inline-flex items-center justify-center w-9 h-9 m-1 text-sm font-semibold text-blue-600 bg-blue-50 rounded-lg hover:bg-blue-600 hover:text-white transition-all border border-blue-100">
                            ${j}
                        </a>
                    `;
                }

                card.innerHTML = `
                    <h2 class="text-lg font-bold text-gray-800 mb-3 pb-2 border-b border-gray-100 flex items-center">
                        <span class="bg-blue-600 text-white w-10 h-10 rounded-lg flex items-center justify-center mr-3 text-sm font-black shadow-md">
                            ${i}
                        </span>
                        Вправа ${i}
                    </h2>
                    <div class="flex flex-wrap">
                        ${subLinks}
                    </div>
                `;
                mainContainer.appendChild(card);
            }
        </script>
    </main>

    <footer class="max-w-4xl mx-auto text-center mt-20 text-gray-500 text-sm border-t border-gray-200 pt-8 mb-10">
        <p class="font-medium text-gray-700 text-base">Підручник з фізики для 8 класу</p>
        <p class="mt-2 text-gray-400">&copy; 2024 GitHub Pages Project</p>
    </footer>

</body>
</html>
